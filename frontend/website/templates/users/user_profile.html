<div class="container h-100 w-100 justify-content-center ">
	<div class="d-flex justify-content-center row">

		<!-- Avatar -->
		<div class="col-12 col-md-3 ">
			<div class="d-flex flex-column align-items-center avatar-container">
				<div id="profileAvatar"></div>
				<div id="modifyProfileAvatar" data-translate="modify"></div>
			</div>
			<!-- Avatar box must be adjusted  -->
			
		</div>

		<!-- User is online/offline status -->
		<div id="profileOnlineStatus" class="col-12 col-md-2">
			Online
		</div>

		<!-- Username & account creation date -->
		<div class="col-12 col-md-7 ">

			<!-- Username -->
			<div class="d-flex align-items-center">
				<div id="profileUsername" class="fw-bold fs-3"></div>
				<div id="modifyProfileUsername" class="m-2" data-translate="modify"></div>
			</div>

			<!-- member creation date -->
			<div class="mb-1 mb-md-4">
				<span data-translate="member_since"></span>
				<span id="profileMemberSince"></span>
			</div>

			<!-- email (only for profile owner) -->
			<div id="profileEmailContainer" class="d-flex align-items-center">
				<div id="profileEmail"></div>
				<div id="modifyProfileEmail" class="m-2 fs-6" data-translate="modify"></div>
			</div>
	
		</div>
	</div>

	<!-- Biography or Desciption,not mandatory -->
	<!-- <div class="row d-flex justify-content-end">
		<div id="profileBiography" class="col-7 d-flex justify-content-center">Hello there</div>
	</div> -->

	<!-- Overall scores (Wins, Losses, leaderboard rank,...) -->
	<div class="row">
		<p id="profileMatchOverview" class="d-flex justify-content-center">Match results overview</p>
	</div>

	<!-- Match history button will be here (will open a modal ?)-->
	<div id="profileMatchHistory"></div>
</div>
