version: '3'

services:
  frontend:
    container_name: trans_front
    build:
      context: ./frontend
    ports:
      - "5555:443"
    networks:
      - trans_net
    restart: on-failure
    depends_on:
      - backend
    volumes:
      - ./frontend/logs:/var/log/nginx   # 403 Forbidden error... why ?

  backend:
    container_name: trans_back
    build: 
      context: ./backend
    ports: 
    - "6666:8000"
    env_file:
      - tools/.env
    # volumes:
      # - ./backend:/usr/src/app/
    depends_on:
      - database

  database:
    container_name: trans_db
    image: postgres:16
    restart: on-failure:5
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    env_file:
      - tools/.env

volumes:
  database:

networks:
  trans_net:
    name: trans_net
    driver: bridge