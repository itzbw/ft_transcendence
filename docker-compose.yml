version: '3'

services:
  frontend:
    container_name: trans_front
    build:
      context: ./frontend
    ports:
      - "${FRONT_PORT}:443"
    networks:
      - trans_net
    restart: on-failure
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend/logs:/var/log/nginx
      - ./frontend/website:/etc/website # WHEN PROJECT FINISHED, DELETE THIS LINE

  backend:
    container_name: trans_back
    build: 
      context: ./backend
    # DEV MODE ONLY, REPLACE ports WITH expose when finished
    # expose:
    #   - ${BACK_PORT}
    ports:
      - "${BACK_PORT}:${BACK_PORT}"
    networks:
      - trans_net
    env_file:
      - .env
    depends_on:
      - database
    volumes:
      - ./backend/django:/app

  database:
    container_name: trans_db
    image: postgres:16
    restart: on-failure:5
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - trans_net
    environment:
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PORT=${DB_PORT}

volumes:
  db_data:

networks:
  trans_net:
    name: trans_net
    driver: bridge