<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .gamemenucontainer {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
        }

        .gamemenubox {
            border: 2px solid #000;
            padding: 10px;
            text-align: center;
            width: 200px;
        }

        .gamemenubox img {
            width: 100%;
            height: auto;
        }

        .gamemenubox p {
            color: white;
            /* Change link color to white */

        }

        .gamemenubox a {
            text-decoration: none;
            /* Add underline on hover */
        }
    </style>
    <script type='text/javascript'>

        (function () {
            if (window.localStorage) {
                if (!localStorage.getItem('firstLoad')) {
                    localStorage['firstLoad'] = true;
                    window.location.reload();
                }
                else
                    localStorage.removeItem('firstLoad');
            }
        })();

    </script>
</head>

<body>
    <h1>Game Menu</h1>
    <div class="gamemenucontainer">
        <div class="gamemenubox">
            <a href="#pongvsbot">
                <img src="../img/marvin.png" alt="vs Bot">
                <p>Pong vs Bot</p>
            </a>
        </div>
        <div class="gamemenubox">
            <a href="#pongvsman">
                <img src="../img/pongvsman.png" alt="vs Man">
                <p>Pong vs Man</p>
            </a>
        </div>
        <div class="gamemenubox">
            <a href="#tournament">
                <img src="../img/tournament.png" alt="tournament">
                <p>Tournament</p>
            </a>
        </div>
    </div>

</body>

</html>
