<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 
	<title>Dashboard template</title>
</head>
<body>
	<a href="#" data-bs-toggle="modal" data-bs-target="#dashboardModal">Dashboard</a>

	<div class="modal-container">
		<div class="modal fade" id="dashboardModal" tabindex="-1" aria-labelledby="dashboardModalLabel" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content ft_box_bg">
	    			<p id="User">User: </p>
	    			<p id="WinGames">Win Games: </p>
	    			<p id="LostGames">Lost Games: </p>
	    			<p id="NumbersGames">Numbers of game: </p>
	    			<p id="PointsScored">Number of points scored: </p>
	    			<p id="PointsSuffered">Number of points suffered: </p>
	    			<canvas id="graph" width="300" height="200" style="border:1px solid black;" style ="width:80% ; height:auto;"></canvas>
	    			<script type="text/javascript">
	    				User = "Arene";
	    				WinGames = 4;
	    				LostGames = 2;
	    				NumbersGames = WinGames + LostGames;
	    				PointsScored = 42;
	    				PointsSuffered = 21;
	    				const canvas = document.getElementById("graph");
	    				const ctx = canvas.getContext("2d");
						document.getElementById("User").textContent += User;
						document.getElementById("WinGames").textContent += WinGames;
						document.getElementById("LostGames").textContent += LostGames;
						document.getElementById("NumbersGames").textContent += NumbersGames;
						document.getElementById("PointsScored").textContent += PointsScored;
						document.getElementById("PointsSuffered").textContent += PointsSuffered;
						window.onresize = updateCanvas;
						function updateCanvas() {
							ctx.clearRect(0, 0, canvas.width, canvas.height);
							var width = canvas.width;
							var height = canvas.height;
							ctx.fillText(width, 10, 50);
							ctx.fillText(height, 10, 100);	
						}
	    			</script>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
